name: Style Check

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  stylecheck:
    name: Run Style Checker
    runs-on: ubuntu-latest
    timeout-minutes: 15  # Beendet den Job nach 15 Minuten, falls er hängt

    steps:
      # Checkout the repository
      - name: Checkout repository
        uses: actions/checkout@v3
        with:
          submodules: true # Ensure submodules are checked out

      # Install Verible Verilog Linter
      - name: Install Verible
        run: |
          sudo apt update
          sudo apt install -y wget
          wget https://github.com/chipsalliance/verible/releases/download/v0.0-3194-gd2d0e8b/verible-v0.0-3194-gd2d0e8b-Ubuntu-22.04.tar.gz
          tar -xvf verible-v0.0-3194-gd2d0e8b-Ubuntu-22.04.tar.gz
          sudo mv verible-v0.0-3194-gd2d0e8b-Ubuntu-22.04/bin/* /usr/local/bin/

      # Debugging Step
      - name: Debugging Step
        run: |
          echo "Listing all Verilog files:"
          find ./src -name "*.sv" -o -name "*.v"

      # Run the linter on Verilog files
      - name: Run Verilog Style Checker
        run: |
          set -x
          find ./src -name "*.sv" -o -name "*.v" | xargs -I {} timeout 300s verible-verilog-linter {}