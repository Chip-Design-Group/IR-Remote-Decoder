name: HDL CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  cocotb-test:
    runs-on: ubuntu-latest

    steps:
      - name: Repo auschecken
        uses: actions/checkout@v4

      - name: System-Pakete installieren (Icarus Verilog)
        run: |
          sudo apt-get update
          sudo apt-get install -y iverilog

      - name: Python einrichten
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Python-Abhängigkeiten installieren
        run: |
          python -m pip install --upgrade pip
          pip install cocotb cocotb-tools pytest

      - name: Cocotb Test ausführen
        env:
          SIM: icarus
        run: |
          python TopLevel/test/test_ir_decoder_integration.py
